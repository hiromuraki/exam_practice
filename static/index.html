<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>练题</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* -----------------------------------------------------------------------
     Page shell — three-column flex layout
     Left: history sidebar (0 → 320px).  Center: main (flex: 1).  Right: result (0 → 380px).
     No overlays — all columns sit in normal flow.
  ----------------------------------------------------------------------- */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
  }

  /* ---- history sidebar (left) ---- */
  .history-sidebar {
    flex: 0 0 0px;
    width: 0;
    overflow: hidden;
    background: #fff;
    border-right: 1px solid #e8e8e8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    transition: flex-basis .3s cubic-bezier(.22,1,.36,1),
                width     .3s cubic-bezier(.22,1,.36,1);
  }
  .history-sidebar.open {
    flex-basis: 320px;
    width: 320px;
    overflow-y: auto;
  }
  @media (max-width: 900px) {
    .history-sidebar.open { flex-basis: 280px; width: 280px; }
  }

  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 16px 10px; flex-shrink: 0;
  }
  .history-header h2 { font-size: 1.1rem; font-weight: 700; color: #16213e; }
  .history-body { flex: 1; overflow-y: auto; padding: 4px 16px 20px; }
  .history-empty { color: #999; font-size: 0.85rem; text-align: center; padding: 40px 0; }

  .history-item {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 8px 0; border-bottom: 1px solid #f2f2f2; font-size: 0.84rem;
  }
  .history-item .hi-type { flex-shrink: 0; margin-top: 1px; }
  .history-item .hi-stem { flex: 1; line-height: 1.45; color: #333; }
  .hi-remove {
    flex-shrink: 0; width: 20px; height: 20px; border: none; background: #f0f0f0;
    border-radius: 50%; cursor: pointer; font-size: 0.65rem; color: #999;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; margin-left: 4px;
  }
  .hi-remove:hover { background: #e74c3c; color: #fff; }

  .history-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; font-size: 0.78rem; background: #f0f0f0;
    border: none; border-radius: 16px; cursor: pointer; color: #555;
    transition: background .15s; white-space: nowrap; vertical-align: middle;
  }
  .history-toggle:hover { background: #e0e0e0; }
  .history-toggle .dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }

  /* ---- center column ---- */
  .main-column {
    flex: 1 1 auto;
    min-width: 0;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
  }
  .main-column-inner {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
  }

  /* ---- right column (result sidebar) ---- */
  .result-sidebar {
    flex: 0 0 0px;
    width: 0;
    overflow: hidden;
    background: #fff;
    border-left: 1px solid #e8e8e8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    transition: flex-basis .35s cubic-bezier(.22,1,.36,1),
                width     .35s cubic-bezier(.22,1,.36,1);
  }
  .result-sidebar.open {
    flex-basis: 380px;
    width: 380px;
    overflow-y: auto;
  }
  @media (max-width: 860px) {
    .result-sidebar.open { flex-basis: 320px; width: 320px; }
  }

  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 20px 12px; flex-shrink: 0;
    white-space: nowrap;
  }
  .sidebar-header h2 { font-size: 1.3rem; font-weight: 700; color: #16213e; }
  .sidebar-close, .history-close {
    width: 32px; height: 32px; border: none; background: #f0f0f0;
    border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    color: #666; flex-shrink: 0; transition: background .15s;
  }
  .sidebar-close:hover, .history-close:hover { background: #e0e0e0; }

  .sidebar-body {
    flex: 1; overflow-y: auto; padding: 4px 20px 24px;
  }

  /* ---- shared components ---- */
  .header { text-align: center; padding: 20px 0 8px; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: #16213e; display: inline; }
  .header .subtitle { color: #888; font-size: 0.82rem; margin-left: 8px; }

  .start-card {
    background: #fff; border-radius: 16px; padding: 48px 32px;
    text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-top: 16px;
  }
  .start-card p { color: #666; margin-bottom: 24px; font-size: 0.95rem; }

  .btn-primary {
    display: inline-block; padding: 14px 48px; font-size: 1.1rem;
    background: #4361ee; color: #fff; border: none; border-radius: 10px;
    cursor: pointer; font-weight: 600; transition: background .2s;
  }
  .btn-primary:hover { background: #3a56d4; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .btn-secondary {
    display: inline-block; padding: 12px 32px; font-size: 1rem; background: #fff; color: #4361ee;
    border: 2px solid #4361ee; border-radius: 10px; cursor: pointer;
    font-weight: 600; transition: all .2s;
  }
  .btn-secondary:hover { background: #eef1ff; }

  .btn-icon {
    width: 36px; height: 36px; border: none; background: transparent;
    border-radius: 8px; cursor: pointer; font-size: 1.2rem;
    display: inline-flex; align-items: center; justify-content: center;
    color: #666; transition: background .15s; vertical-align: middle; margin-left: 8px;
  }
  .btn-icon:hover { background: #f0f0f0; }

  /* ---- question cards ---- */
  .question-card {
    background: #fff; border-radius: 14px; padding: 24px;
    margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05);
    transition: box-shadow .2s;
  }
  .question-card.correct { box-shadow: 0 0 0 2px #2ecc71; }
  .question-card.incorrect { box-shadow: 0 0 0 2px #e74c3c; }

  .q-header {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px;
    font-size: 1rem; font-weight: 500;
  }
  .q-number {
    background: #4361ee; color: #fff; border-radius: 8px;
    min-width: 32px; height: 32px; display: flex; align-items: center;
    justify-content: center; font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
  }
  .q-stem { padding-top: 4px; }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-label {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px;
    cursor: pointer; transition: all .15s; user-select: none;
    background: #fafafa;
  }
  .choice-label:hover { border-color: #4361ee; background: #eef1ff; }
  .choice-label input { display: none; }
  .choice-marker {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid #aaa;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; font-size: 0.75rem; font-weight: 700; color: transparent;
  }
  .choice-label input:checked + .choice-marker {
    background: #4361ee; border-color: #4361ee; color: #fff;
  }
  .choice-label input:checked + .choice-marker::after { content: "✓"; }
  .choice-text { font-size: 0.95rem; color: #333; }

  /* cloze text input */
  .cloze-input {
    width: 100%; padding: 12px 14px; font-size: 0.95rem;
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    background: #fafafa; color: #333; outline: none;
    transition: border-color .15s;
  }
  .cloze-input:focus { border-color: #4361ee; background: #fff; }

  /* feedback */
  .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #e8f8f0; color: #1b7a44; }
  .feedback.incorrect { background: #fde8e8; color: #b91c1c; }
  .feedback .expected { margin-top: 4px; font-size: 0.85rem; color: #555; }

  /* ---- practice area ---- */
  #practiceArea {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  #questionsContainer { flex: 1; }

  /* start screen */
  #startScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ---- bottom bar ---- */
  .submit-bar {
    position: sticky; bottom: 0; padding: 16px 0;
    background: linear-gradient(transparent, #f5f7fa 20%);
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
  }
  .submit-bar .btn-submit { padding: 12px 40px; font-size: 1rem; }

  /* ---- sidebar contents ---- */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: #f5f7fa; border-radius: 12px; padding: 14px 6px; text-align: center; }
  .stat-box .num { font-size: 1.7rem; font-weight: 700; color: #16213e; }
  .stat-box .label { font-size: 0.78rem; color: #888; margin-top: 2px; }
  .stat-box.highlight .num { color: #2ecc71; }

  .sidebar-section-title {
    font-size: 0.8rem; font-weight: 600; color: #999;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
  }
  .detail-list { margin-bottom: 16px; }
  .detail-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f2f2f2; font-size: 0.88rem; }
  .detail-item .icon { font-size: 1.05rem; flex-shrink: 0; }
  .detail-item .q-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .sidebar-actions { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

  /* ---- util ---- */
  .hidden { display: none !important; }
  .tag {
    display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
    margin-left: 8px; font-weight: 500; white-space: nowrap;
  }
  .tag-single { background: #e8f0fe; color: #1967d2; }
  .tag-multi  { background: #fce8e6; color: #c5221f; }
  .tag-judge  { background: #fef7e0; color: #e37400; }
  .tag-cloze  { background: #e6f4ea; color: #137333; }
</style>
</head>
<body>

<!-- ======================================================================
     LEFT — history sidebar
     ====================================================================== -->
<div class="history-sidebar" id="historySidebar">
  <div class="history-header">
    <h2>✅ 已掌握</h2>
    <button class="history-close" id="historyCloseBtn">✕</button>
  </div>
  <div class="history-body" id="historyBody">
    <div class="history-empty">暂无记录 · 答对题目后将出现在这里</div>
  </div>
</div>

<!-- ======================================================================
     CENTER — main content
     ====================================================================== -->
<div class="main-column" id="mainColumn">
  <div class="main-column-inner">

    <div class="header">
      <h1>📝 练题</h1>
      <button class="history-toggle" id="historyToggleBtn" title="查看已掌握的题目">
        📋 查看已掌握的题目
      </button>
      <span class="subtitle" id="headerCount"></span>
    </div>

    <!-- start screen -->
    <div id="startScreen" class="start-card">
      <p>将从题库中随机抽取最多 <strong>20</strong> 道题目，选项顺序随机打乱。<br>已掌握的题目会被自动跳过。</p>
      <button class="btn-primary" id="startBtn">开始练习</button>
    </div>

    <!-- practice area -->
    <div id="practiceArea" class="hidden">
      <div id="questionsContainer"></div>
      <div class="submit-bar">
        <button class="btn-primary btn-submit" id="submitBtn">提交答案</button>
        <button class="btn-secondary hidden" id="retryBtn">再来一组</button>
      </div>
    </div>

  </div>
</div>

<!-- ======================================================================
     RIGHT — result sidebar
     ====================================================================== -->
<div class="result-sidebar" id="resultSidebar">
  <div class="sidebar-header">
    <h2>📊 答题完成</h2>
    <button class="sidebar-close" id="sidebarCloseBtn">✕</button>
  </div>
  <div class="sidebar-body">
    <div class="stats-grid">
      <div class="stat-box"><div class="num" id="statTotal">0</div><div class="label">总题数</div></div>
      <div class="stat-box highlight"><div class="num" id="statCorrect">0</div><div class="label">正确</div></div>
      <div class="stat-box"><div class="num" id="statRate">0%</div><div class="label">正确率</div></div>
    </div>
    <div class="sidebar-section-title">逐题结果</div>
    <div class="detail-list" id="detailList"></div>
    <div class="sidebar-actions">
      <button class="btn-primary" id="sidebarRetryBtn" style="width:100%;">再来一组</button>
      <button class="btn-secondary" id="sidebarCloseBtn2" style="width:100%;">关闭</button>
    </div>
  </div>
</div>

<script>
// =========================================================================
// localStorage helpers
//
//   exam_practice_correct  →  { id: count }          (the user's data)
//   exam_practice_meta     →  { id: {s:stem, t:type} }  (display metadata only)
// =========================================================================
const LS_CORRECT = 'exam_practice_correct';
const LS_META    = 'exam_practice_meta';

function loadCounts() {
  try { return JSON.parse(localStorage.getItem(LS_CORRECT)) || {}; }
  catch { return {}; }
}
function saveCounts(data) {
  localStorage.setItem(LS_CORRECT, JSON.stringify(data));
}
function loadMeta() {
  try { return JSON.parse(localStorage.getItem(LS_META)) || {}; }
  catch { return {}; }
}
function saveMeta(data) {
  localStorage.setItem(LS_META, JSON.stringify(data));
}

/** Increment correct-count for each entry.  entry = {id, stem, type}. */
function incrementCorrect(entries) {
  const counts = loadCounts();
  const meta = loadMeta();
  for (const e of entries) {
    counts[e.id] = (counts[e.id] || 0) + 1;
    if (!meta[e.id]) meta[e.id] = { s: e.stem, t: e.type };
  }
  saveCounts(counts);
  saveMeta(meta);
}

/** Remove a question from the tracker entirely. */
function removeCorrect(id) {
  const counts = loadCounts();
  const meta = loadMeta();
  delete counts[id];
  delete meta[id];
  saveCounts(counts);
  saveMeta(meta);
}

/** IDs with count ≥ 3. */
function getMasteredIds() {
  const counts = loadCounts();
  return Object.entries(counts).filter(([,c]) => c >= 3).map(([k]) => k);
}

function getMasteredCount() {
  return getMasteredIds().length;
}

// =========================================================================
// State
// =========================================================================
let questions = [];       // current practice set
let submitted = false;    // whether answers have been submitted

// =========================================================================
// DOM refs
// =========================================================================
const startScreen      = document.getElementById('startScreen');
const practiceArea     = document.getElementById('practiceArea');
const container        = document.getElementById('questionsContainer');
const submitBtn        = document.getElementById('submitBtn');
const retryBtn         = document.getElementById('retryBtn');
const resultSidebar    = document.getElementById('resultSidebar');
const historySidebar   = document.getElementById('historySidebar');
const historyBody      = document.getElementById('historyBody');
const historyToggleBtn = document.getElementById('historyToggleBtn');

// =========================================================================
// History sidebar
// =========================================================================
historyToggleBtn.addEventListener('click', () => {
  historySidebar.classList.toggle('open');
  if (historySidebar.classList.contains('open')) renderHistory();
});
document.getElementById('historyCloseBtn').addEventListener('click', () => {
  historySidebar.classList.remove('open');
});

function renderHistory() {
  const counts = loadCounts();
  const meta = loadMeta();
  // Build items from counts + meta, sort by type then stem
  const items = Object.entries(counts).map(([id, count]) => ({
    id, count,
    stem: (meta[id] || {}).s || '(未知题目)',
    type: (meta[id] || {}).t || '单选',
  })).sort((a, b) => a.type.localeCompare(b.type) || a.stem.localeCompare(b.stem));

  if (!items.length) {
    historyBody.innerHTML = '<div class="history-empty">暂无记录 · 答对题目后将出现在这里</div>';
    return;
  }

  // Split into mastered (≥3) and learning (1-2)
  const mastered = items.filter(it => it.count >= 3);
  const learning = items.filter(it => it.count < 3);

  let html = '';

  if (mastered.length) {
    html += `<div class="sidebar-section-title">✅ 已掌握 · ${mastered.length} 题 (答对 ≥3 次)</div>`;
    html += renderHistoryGroup(mastered);
  }

  if (learning.length) {
    html += `<div class="sidebar-section-title" style="margin-top:16px;">📖 掌握中 · ${learning.length} 题</div>`;
    html += renderHistoryGroup(learning);
  }

  historyBody.innerHTML = html;

  // Attach remove handlers
  historyBody.querySelectorAll('.hi-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      removeCorrect(btn.dataset.qid);
      renderHistory();
    });
  });
}

function renderHistoryGroup(items) {
  return items.map(it => {
    const tagCls = tagClass(it.type);
    const countBadge = it.count >= 3
      ? `<span style="color:#2ecc71;font-weight:600;">✓${it.count}</span>`
      : `<span style="color:#e37400;">${it.count}/3</span>`;
    return `<div class="history-item">
      <span class="tag tag-${tagCls}">${it.type}</span>
      <span class="hi-stem">${escapeHtml(truncate(it.stem, 54))}</span>
      <span style="flex-shrink:0;font-size:0.75rem;margin-left:4px;">${countBadge}</span>
      <button class="hi-remove" data-qid="${escapeHtml(it.id)}" title="移出已掌握">✕</button>
    </div>`;
  }).join('');
}

function tagClass(qtype) {
  if (qtype === 'judgement') return 'judge';
  if (qtype === 'cloze') return 'cloze';
  return 'single';
}

function truncate(s, max) {
  return s.length > max ? s.slice(0, max) + '…' : s;
}

// Migrate old-format data on first load
(function migrateOldData() {
  const oldKey = 'exam_practice_correct_v2';
  try {
    const oldRaw = localStorage.getItem(oldKey);
    if (oldRaw) {
      const old = JSON.parse(oldRaw);            // {id: {c, s, t}} or old array
      const counts = loadCounts();
      const meta = loadMeta();
      if (Array.isArray(old)) {
        // v1: [{id, stem, type}]
        for (const it of old) { counts[it.id] = (counts[it.id] || 0) + 1; meta[it.id] = { s: it.stem, t: it.type }; }
      } else {
        // v2: {id: {c, s, t}}
        for (const [id, v] of Object.entries(old)) {
          counts[id] = (counts[id] || 0) + (v.c || 1);
          if (!meta[id] && v.s) meta[id] = { s: v.s, t: v.t };
        }
      }
      saveCounts(counts);
      saveMeta(meta);
      localStorage.removeItem(oldKey);
    }
  } catch {}
})();

// Initial render on page load
renderHistory();
fetchPoolInfo();

async function fetchPoolInfo() {
  try {
    const res = await fetch('/api/pool-info');
    if (!res.ok) return;
    const data = await res.json();
    const counts = data.pool_counts || {};
    const parts = ['单选','多选','判断','填空'].filter(k => counts[k]).map(k => `${k} ${counts[k]}`);
    const masteredN = getMasteredCount();
    const masteredStr = masteredN > 0 ? ` · 已掌握 ${masteredN}` : '';
    document.getElementById('headerCount').textContent =
      `题库 ${parts.join(' · ')}${masteredStr}`;
  } catch {}
}

// =========================================================================
// Start
// =========================================================================
document.getElementById('startBtn').addEventListener('click', startPractice);
retryBtn.addEventListener('click', startPractice);

document.getElementById('sidebarRetryBtn').addEventListener('click', closeResultAndRetry);
document.getElementById('sidebarCloseBtn').addEventListener('click', closeResult);
document.getElementById('sidebarCloseBtn2').addEventListener('click', closeResult);

function closeResult() {
  resultSidebar.classList.remove('open');
}

function closeResultAndRetry() {
  closeResult();
  startPractice();
}

async function startPractice() {
  submitted = false;
  submitBtn.textContent = '提交答案';
  submitBtn.disabled = false;
  retryBtn.classList.add('hidden');
  closeResult();

  // Collect mastered IDs (count ≥ 3) to deprioritise
  const masteredIds = getMasteredIds();

  try {
    const res = await fetch('/api/practice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ n: 20, mastered_ids: masteredIds }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    questions = data.questions;

    const counts = data.pool_counts || {};
    const parts = ['单选','多选','判断','填空'].filter(k => counts[k]).map(k => `${k} ${counts[k]}`);
    const remaining = data.remaining != null ? ` · 剩余 ${data.remaining}` : '';
    const masteredN = getMasteredCount();
    const masteredStr = masteredN > 0 ? ` · 已掌握 ${masteredN}` : '';
    document.getElementById('headerCount').textContent =
      `本次 ${data.total} 题  |  题库 ${parts.join(' · ')}${remaining}${masteredStr}`;

    renderQuestions(questions);
    startScreen.classList.add('hidden');
    practiceArea.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    alert('获取题目失败: ' + err.message);
  }
}

// =========================================================================
// Render
// =========================================================================
function renderQuestions(qs) {
  container.innerHTML = '';
  qs.forEach((q, idx) => {
    const qtype = q.type || 'multiple-choice';
    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.index = idx;
    card.dataset.qtype = qtype;

    // --- header ---
    const header = document.createElement('div');
    header.className = 'q-header';
    const tagHtml = typeTag(qtype, q.answer_count);
    header.innerHTML =
      `<span class="q-number">${idx + 1}</span>` +
      `<span class="q-stem">${escapeHtml(q.stem)}</span>` +
      tagHtml;
    card.appendChild(header);

    // --- answer area ---
    if (qtype === 'cloze') {
      renderClozeInput(card, idx);
    } else {
      renderChoices(card, q, idx, qtype);
    }

    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    feedback.id = `fb_${idx}`;
    card.appendChild(feedback);

    container.appendChild(card);
  });
}

function typeTag(qtype, answerCount) {
  let cls, label;
  if (qtype === 'judgement')         { cls = 'tag-judge';  label = '判断'; }
  else if (qtype === 'cloze')        { cls = 'tag-cloze';  label = '填空'; }
  else if (answerCount === 1)        { cls = 'tag-single'; label = '单选'; }
  else                               { cls = 'tag-multi';  label = '多选'; }
  return `<span class="tag ${cls}">${label}</span>`;
}

function labelForType(qtype, answerCount) {
  if (qtype === 'judgement') return '判断';
  if (qtype === 'cloze') return '填空';
  return answerCount === 1 ? '单选' : '多选';
}

function renderClozeInput(card, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'choices';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'cloze-input';
  input.placeholder = '在此输入答案…';
  input.dataset.idx = idx;
  input.autocomplete = 'off';
  wrap.appendChild(input);
  card.appendChild(wrap);
}

function renderChoices(card, q, idx, qtype) {
  const isSingle = (qtype === 'judgement') || (q.answer_count === 1);
  const inputType = isSingle ? 'radio' : 'checkbox';
  const groupName = `q_${idx}`;

  const choicesDiv = document.createElement('div');
  choicesDiv.className = 'choices';

  (q.choices || []).forEach((choiceText, ci) => {
    const label = document.createElement('label');
    label.className = 'choice-label';

    const input = document.createElement('input');
    input.type  = inputType;
    input.name  = isSingle ? groupName : `q_${idx}_${ci}`;
    input.value = (q.choice_values || [])[ci] || choiceText;
    input.dataset.idx = idx;

    const marker = document.createElement('span');
    marker.className = 'choice-marker';

    const text = document.createElement('span');
    text.className = 'choice-text';
    text.textContent = choiceText;

    label.appendChild(input);
    label.appendChild(marker);
    label.appendChild(text);
    choicesDiv.appendChild(label);
  });
  card.appendChild(choicesDiv);
}

// =========================================================================
// Submit
// =========================================================================
submitBtn.addEventListener('click', onSubmit);

async function onSubmit() {
  if (!questions.length) return;

  if (submitted) {
    scrollToFirstIncorrect();
    return;
  }

  const answers = questions.map((q, idx) => {
    const qtype = q.type || 'multiple-choice';
    let selected;

    if (qtype === 'cloze') {
      const input = container.querySelector(`.cloze-input[data-idx="${idx}"]`);
      selected = input ? [input.value] : [''];
    } else {
      const inputs = container.querySelectorAll(`.choice-label input[data-idx="${idx}"]:checked`);
      selected = Array.from(inputs).map(inp => inp.value);
    }
    return { stem: q.stem, selected };
  });

  try {
    submitBtn.disabled = true;
    submitBtn.textContent = '验证中…';

    const res = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Per-question feedback + collect newly-correct IDs
    const newCorrect = [];
    data.results.forEach((r, idx) => {
      const card = container.querySelector(`.question-card[data-index="${idx}"]`);
      const fb   = document.getElementById(`fb_${idx}`);
      if (!fb) return;

      card.classList.add(r.correct ? 'correct' : 'incorrect');
      fb.className = `feedback show ${r.correct ? 'correct' : 'incorrect'}`;
      fb.innerHTML = r.correct
        ? '<strong>✓ 正确</strong>'
        : `<strong>✗ 错误</strong><div class="expected">正确答案：${escapeHtml(r.expected.join('、'))}</div>`;

      if (r.correct && r.id) {
        const q = questions[idx];
        newCorrect.push({
          id: r.id,
          stem: r.stem,
          type: labelForType(q.type, q.answer_count),
        });
      }
    });

    // Persist correct answers (increment count)
    if (newCorrect.length) {
      incrementCorrect(newCorrect);
      renderHistory();
    }

    // Open the right result sidebar
    showResultSidebar(data.stats, data.results);

    submitted = true;
    submitBtn.textContent = '查看错题';
    submitBtn.disabled = false;
    retryBtn.classList.remove('hidden');
  } catch (err) {
    alert('提交失败: ' + err.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '提交答案';
  }
}

function scrollToFirstIncorrect() {
  const firstBad = container.querySelector('.question-card.incorrect');
  if (firstBad) firstBad.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// =========================================================================
// Result sidebar
// =========================================================================
function showResultSidebar(stats, results) {
  document.getElementById('statTotal').textContent   = stats.total;
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statRate').textContent    = stats.rate + '%';

  const list = document.getElementById('detailList');
  list.innerHTML = '';
  results.forEach((r) => {
    const div = document.createElement('div');
    div.className = 'detail-item';
    div.innerHTML =
      `<span class="icon">${r.correct ? '✅' : '❌'}</span>` +
      `<span class="q-text">${escapeHtml(r.stem)}</span>`;
    list.appendChild(div);
  });

  resultSidebar.classList.add('open');
}

// =========================================================================
// Helpers
// =========================================================================
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
